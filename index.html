<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Generated MCQ Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="brand">
    <h1><span class="orange">Nav</span><span class="white">Gurukul</span></h1>
  </div>

  <div class="intro-message">
    Enter a concept name below and I will generate a quiz for you!
  </div>

  <div id="quiz-container">
    <div id="input-section">
      <input type="text" id="concept-input" placeholder="Enter concept name..." />
      <label>
        <input type="checkbox" id="coding-checkbox" />
        Only include coding questions
      </label>
      <button id="start-btn">Generate Quiz</button>
    </div>

    <div id="quiz-section" class="hidden">
      <div id="question-container"></div>
      <div id="options-container"></div>
      <button id="next-btn" disabled>Next</button>
    </div>

    <div id="result-section" class="hidden">
      <h2>Quiz Completed!</h2>
      <p id="score-text"></p>
      <button id="restart-btn">Restart</button>
      <button id="more-questions-btn" class="hidden">More Questions on Same Topic</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
